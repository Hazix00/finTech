<section class="portal-page">
  <h1 class="portal-title">Beneficiary Portal</h1>

  <p-card header="Submit a New Aid Request" styleClass="portal-card">
    <form class="portal-form-grid" [formGroup]="requestForm" (ngSubmit)="submitRequest()">

      <label class="portal-label">
        Category
        <p-dropdown
          [options]="categoryOptions"
          formControlName="category"
          optionLabel="label"
          optionValue="value"
          placeholder="Select a category"
          styleClass="portal-form-field"
        ></p-dropdown>
      </label>

      <label class="portal-label">
        Amount
        <div class="p-inputgroup portal-form-field">
          <span class="p-inputgroup-addon">€</span>
          <input
            pInputText
            type="number"
            step="0.01"
            placeholder="0.00"
            formControlName="amount"
          />
        </div>
      </label>

      <label class="portal-label portal-full-width">
        Description
        <textarea
          pInputTextarea
          rows="4"
          class="portal-form-field"
          placeholder="Describe your need"
          formControlName="description"
          maxlength="2000"
        ></textarea>
      </label>

      <p-message
        *ngIf="activeAtLimit"
        severity="warn"
        class="portal-full-width"
        text="You already have 2 active requests (PENDING or UNDER REVIEW). Wait for one to be resolved before submitting a new one."
      ></p-message>

      <div class="portal-full-width portal-actions">
        <button
          pButton
          type="submit"
          label="Submit Request"
          [loading]="submitting"
          [disabled]="requestForm.invalid || submitting || activeAtLimit"
        ></button>
      </div>
    </form>
  </p-card>

  <p-card header="My Requests" styleClass="portal-card">
    <div class="portal-actions" style="margin-bottom: 1rem;">
      <p-dropdown
        [options]="statusFilterOptions"
        [(ngModel)]="statusFilter"
        name="statusFilter"
        optionLabel="label"
        optionValue="value"
        placeholder="Filter by status"
        styleClass="portal-form-field"
      ></p-dropdown>
      <button pButton type="button" label="Apply Filter" (click)="onApplyFilter()"></button>
    </div>

    <p-table [value]="myRequests$ | async" styleClass="portal-table" [loading]="loading">
      <ng-template pTemplate="header">
        <tr>
          <th>ID</th>
          <th>Category</th>
          <th>Amount</th>
          <th>Status</th>
          <th>Created At</th>
        </tr>
      </ng-template>
      <ng-template pTemplate="body" let-request>
        <tr>
          <td>{{ request.id }}</td>
          <td>{{ request.category }}</td>
          <td>{{ request.amount | currency: 'EUR' : 'symbol' : '1.2-2' }}</td>
          <td>{{ request.status }}</td>
          <td>{{ request.createdAt | date: 'yyyy-MM-dd HH:mm' }}</td>
        </tr>
      </ng-template>
    </p-table>
    <p-paginator
      [rows]="limit"
      [totalRecords]="(totalRecords$ | async) ?? 0"
      [first]="(page - 1) * limit"
      (onPageChange)="onPageChange($event)"
    ></p-paginator>
  </p-card>
</section>
